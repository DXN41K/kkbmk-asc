<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вакансии ВО и СПО</title>
  <style>
    :root { --bg: #f5f7fa; --card: #fff; --primary: #2563eb; --border: #e2e8f0; --text: #1e293b; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 20px; }
    .filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .filters select { flex: 1; min-width: 150px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); font-size: 14px; cursor: pointer; }
    .table-wrap { background: var(--card); border-radius: 12px; overflow-x: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; }
    tr:hover { background: #f1f5f9; }
    .empty { padding: 40px; text-align: center; color: #64748b; }
    .loading { text-align: center; padding: 40px; font-size: 1.2rem; color: #64748b; }
    .error { background: #fef2f2; color: #b91c1c; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    @media (max-width: 900px) { .filters { flex-direction: column; } table { font-size: 13px; } th, td { padding: 8px; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Вакансии ВО и СПО</h1>
    <div class="filters">
      <select id="f-level"><option value="">Все уровни</option></select>
      <select id="f-inst"><option value="">Все учреждения</option></select>
      <select id="f-dept"><option value="">Все подразделения</option></select>
      <select id="f-mentor"><option value="">Все должности</option></select>
    </div>
    
    <div id="status" class="loading">Загрузка данных...</div>
    <div class="table-wrap" id="table-container" style="display:none;">
      <table id="tbl">
        <thead>
          <tr>
            <th>№</th><th>Уровень</th><th>Учреждение</th><th>Вакансия</th>
            <th>Подразделение</th><th>Вакантные</th><th>Целевые</th><th>Наставник</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const clean = v => v ? String(v).trim().replace(/\s+/g, ' ') : '';
    let data = [];

    // Загрузка JSON
    fetch('./data.json')
      .then(res => {
        if (!res.ok) throw new Error('Не удалось загрузить data.json');
        return res.json();
      })
      .then(raw => {
        // Преобразование в удобный формат
        data = raw.map(r => ({
          level: clean(r["Уровень"]),
          inst: clean(r["Учреждение"]),
          vac: clean(r["Вакансия"]),
          dept: clean(r["Подразделение"]),
          vacant: clean(r["Вакантные места"]),
          target: clean(r["Целевые места"]),
          mentor: clean(r["Наставник"])
        }));

        // Заполнение фильтров
        ['level','inst','dept','mentor'].forEach(key => {
          const id = `f-${key}`;
          const sel = document.getElementById(id);
          const unique = [...new Set(data.map(r => r[key]))].filter(Boolean).sort((a,b)=>a.localeCompare(b));
          unique.forEach(val => {
            const opt = document.createElement('option');
            opt.value = val; opt.textContent = val;
            sel.appendChild(opt);
          });
        });

        // Показать таблицу, скрыть загрузку
        document.getElementById('status').style.display = 'none';
        document.getElementById('table-container').style.display = 'block';
        render();
      })
      .catch(err => {
        document.getElementById('status').innerHTML = `<div class="error">⚠️ Ошибка: ${err.message}<br>Убедитесь, что файл <code>data.json</code> лежит рядом с <code>index.html</code> и открывается через сервер (GitHub Pages / Live Server).</div>`;
      });

    // Рендер таблицы
    const render = () => {
      const lvl = document.getElementById('f-level').value;
      const inst = document.getElementById('f-inst').value;
      const dept = document.getElementById('f-dept').value;
      const ment = document.getElementById('f-mentor').value;
      const tbody = document.getElementById('tbody');
      tbody.innerHTML = '';

      const filtered = data.filter(r => 
        (!lvl || r.level === lvl) && 
        (!inst || r.inst === inst) && 
        (!dept || r.dept === dept) && 
        (!ment || r.mentor === ment)
      );

      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="8" class="empty">Нет данных по выбранным фильтрам</td></tr>';
        return;
      }

      filtered.forEach((r, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${r.level}</td><td>${r.inst}</td><td>${r.vac}</td>
          <td>${r.dept}</td><td>${r.vacant}</td><td>${r.target}</td><td>${r.mentor}</td>
        `;
        tbody.appendChild(tr);
      });
    };

    // Слушатели фильтров
    ['f-level','f-inst','f-dept','f-mentor'].forEach(id => 
      document.getElementById(id).addEventListener('change', render)
    );
  </script>
</body>
</html>
