    th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border); }
    th { background: #f8fafc; font-weight: 600; position: sticky; top: 0; }
    tr:last-child td { border-bottom: none; }
    .empty { padding: 40px; text-align: center; color: #64748b; }
    @media (max-width: 768px) { .filters { flex-direction: column; } table { font-size: 13px; } th, td { padding: 10px; } }

    // Очистка строк: обрезка пробелов, схлопывание, защита от null/undefined
   
const clean = v => v ? String(v).trim().replace(/\s+/g, ' ') : '';

let lastInst = ''; // Для исправления объединённых ячеек Excel

const data = rawData.map(r => {
  // Извлекаем значения по порядку столбцов в вашем JSON
  const [pp, qty, instRaw, vac, dept, mentor] = Object.values(r).map(clean);
  
  // Если ячейка учреждения пустая, берём предыдущее значение (фикс merged cells)
  if (instRaw) lastInst = instRaw;
  const inst = instRaw || lastInst;

  return {
    level: 'ВО', // В вашем экспорте нет столбца уровня, временно ставим "ВО"
    pp, inst, vac, dept, qty, mentor
  };
});

// Заполнение выпадающих списков
const populate = (id, key) => {
  const sel = document.getElementById(id);
  const unique = [...new Set(data.map(r => r[key]))].filter(Boolean).sort((a,b)=>a.localeCompare(b));
  unique.forEach(val => {
    const opt = document.createElement('option');
    opt.value = val; opt.textContent = val;
    sel.appendChild(opt);
  });
};

populate('f-level', 'level');
populate('f-inst', 'inst');
populate('f-dept', 'dept');
populate('f-mentor', 'mentor');

// Рендер таблицы
const render = () => {
  const lvl = document.getElementById('f-level').value;
  const inst = document.getElementById('f-inst').value;
  const dept = document.getElementById('f-dept').value;
  const ment = document.getElementById('f-mentor').value;
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  const filtered = data.filter(r => 
    (!lvl || r.level === lvl) && 
    (!inst || r.inst === inst) && 
    (!dept || r.dept === dept) && 
    (!ment || r.mentor === ment)
  );

  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Нет данных по выбранным фильтрам</td></tr>';
    return;
  }

  filtered.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${r.pp}</td><td>${r.level}</td><td>${r.inst}</td><td>${r.vac}</td><td>${r.dept}</td><td>${r.qty}</td><td>${r.mentor}</td>`;
    tbody.appendChild(tr);
  });
};

// Слушатели изменений
['f-level','f-inst','f-dept','f-mentor'].forEach(id => 
  document.getElementById(id).addEventListener('change', render)
);
render();
